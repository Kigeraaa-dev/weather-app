# ─────────────────────────────────────────────────────────────────────────────
# application.properties
#
# This is where your secret API key lives.
# Java reads this file automatically when the server starts.

weather.api.key=1195644013fe2798966b500daa214f38

# The port your Java server runs on
# Open this in your browser to test: http://localhost:8080/api/weather/health
# If you get a "port already in use" error, change 8080 to 8081
server.port=8080

# App name (shows in the terminal logs)
spring.application.name=weather-api

# Log level — INFO shows normal messages, DEBUG shows everything
logging.level.com.weather=INFO
